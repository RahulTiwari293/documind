version: "3.9"

services:
  endee:
    image: endeeio/endee:latest
    container_name: endee_db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    environment:
      NDD_DATA_DIR: /data
      NDD_AUTH_TOKEN: ${NDD_AUTH_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/index/list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: documind_app
    ports:
      - "8501:8501"
    environment:
      ENDEE_URL: http://endee:8080
      ENDEE_AUTH_TOKEN: ${NDD_AUTH_TOKEN:-}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

volumes:
  endee_data:
