version: "3.9"

services:
  endee:
    image: endeeio/endee:latest
    container_name: endee_db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    environment:
      NDD_DATA_DIR: /data

  app:
    build: .
    container_name: documind_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      ENDEE_URL: http://endee:8080
    depends_on:
      - endee
    volumes:
      - .:/app

volumes:
  endee_data:
